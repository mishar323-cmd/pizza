# /etc/nginx/sites-available/pizza.conf
# External host nginx — terminates TLS, proxies to docker compose stack on 127.0.0.1:8080.
# Get certs via: sudo certbot --nginx -d pizza.example.com -d www.pizza.example.com

# HTTP → HTTPS redirect (Let's Encrypt challenge passes through)
server {
  listen 80;
  listen [::]:80;
  server_name pizza.example.com www.pizza.example.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# HTTPS
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name pizza.example.com www.pizza.example.com;

  # TLS — paths populated by certbot
  ssl_certificate     /etc/letsencrypt/live/pizza.example.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/pizza.example.com/privkey.pem;

  # Modern TLS — Mozilla intermediate
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
  ssl_prefer_server_ciphers off;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;
  ssl_session_tickets off;
  ssl_stapling on;
  ssl_stapling_verify on;
  resolver 1.1.1.1 8.8.8.8 valid=300s;

  # HSTS — turn on once stack proven, then increase max-age to 31536000
  add_header Strict-Transport-Security "max-age=86400; includeSubDomains" always;

  client_max_body_size 1m;

  # Optional: restrict admin panel by IP whitelist
  # location /admin {
  #   allow 1.2.3.4;
  #   deny all;
  #   proxy_pass http://127.0.0.1:8080;
  #   include /etc/nginx/proxy_params;
  # }

  location / {
    proxy_pass http://127.0.0.1:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    proxy_connect_timeout 5s;
  }
}
